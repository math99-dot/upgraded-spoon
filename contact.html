<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Contact Us!</h1>
  <p>We'd love to hear from you!</p>
</header>

<nav>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop Flowers</a>
    <a href="about.html">About Clara</a>
    <a href="weddings.html">Weddings &amp; Events</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </div>
  <button class="hamburger" id="hamburger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="form-section">
  <h2>Send Us a Message</h2>

  <div class="form-group">
    <label for="name">Your Name</label>
    <input type="text" id="name" placeholder="Jane Smith">
  </div>

  <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="jane@example.com">
  </div>

  <div class="form-group">
    <label for="occasion">Occasion Type</label>
    <select id="occasion">
      <option value="">-- Select an occasion --</option>
      <option>Wedding</option>
      <option>Birthday</option>
      <option>Anniversary</option>
      <option>Sympathy</option>
      <option>Just Because</option>
      <option>Other</option>
    </select>
  </div>

  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" placeholder="Tell us about your order or question..."></textarea>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitForm()">Send Message</button>

  <div class="success-msg" id="successMsg">
    ✅ Thank you! Your message has been received. Clara will be in touch soon.
  </div>
</div>

<footer><p>&copy; Flowers by Clara</p></footer>

<script>
  document.getElementById('hamburger').addEventListener('click', function() {
    document.getElementById('navLinks').classList.toggle('open');
  });

  function submitForm() {
    var name    = document.getElementById('name').value.trim();
    var email   = document.getElementById('email').value.trim();
    var message = document.getElementById('message').value.trim();

    if (!name || !email || !message) {
      alert('Please fill in your name, email, and message before submitting.');
      return;
    }

    // Simple email format check
    if (!email.includes('@') || !email.includes('.')) {
      alert('Please enter a valid email address.');
      return;
    }

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = 'Sent!';
    document.getElementById('successMsg').style.display = 'block';
  }
</script>

</body>
</html>
